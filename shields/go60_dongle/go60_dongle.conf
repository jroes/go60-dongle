# Go60 dongle central (Seeed XIAO nRF52840)

# The dongle talks to the host over USB (HID) and BLE, and to the two halves
# over BLE as a split central.
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y
CONFIG_ZMK_SPLIT_BLE=y

# Pointing subsystem so the forwarded Cirque trackpads produce HID pointer input
CONFIG_ZMK_POINTING=y

# The dongle is USB powered; never sleep, and broadcast at higher TX power for
# the better signal that is the whole point of the dongle.
CONFIG_ZMK_SLEEP=n
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Uncomment to enable ZMK Studio over USB on the dongle (as in jons_keyb_dongle)
# CONFIG_ZMK_STUDIO=y
