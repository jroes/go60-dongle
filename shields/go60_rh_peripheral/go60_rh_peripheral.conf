# Right half as a BLE split peripheral of the dongle (stock role, explicit).
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
CONFIG_ZMK_SPLIT_BLE=y

# Forward the right trackpad over the split.
CONFIG_ZMK_POINTING=y

CONFIG_ZMK_USB=n

# Disable RGB underglow to match the left half (the dongle owns status indication
# now). The right half links fine with RGB on, but keeping both halves consistent
# avoids one side glowing and the other dark.
CONFIG_ZMK_RGB_UNDERGLOW=n

# The Cirque trackpad is an SPI device; MoErgo enables CONFIG_SPI only via RGB
# underglow, so enable it explicitly here now that underglow is off.
CONFIG_SPI=y
