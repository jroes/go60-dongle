name: Build

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout config repo
        uses: actions/checkout@v4

      - name: Checkout MoErgo ZMK distribution
        uses: actions/checkout@v4
        with:
          repository: moergo-sc/zmk
          ref: main
          path: src

      - name: Copy custom shields into ZMK
        run: cp -r shields/* src/app/boards/shields/

      # The XIAO board ships a loose app/boards/seeeduino_xiao_ble.overlay.
      # With MoErgo's -DBOARD_ROOT=. that file is discovered twice and ninja
      # errors ("defined as an output multiple times"). Its contents are folded
      # into shields/go60_dongle/go60_dongle.overlay, so remove the loose copy.
      - name: Drop duplicate XIAO board overlay
        run: rm -f src/app/boards/seeeduino_xiao_ble.overlay

      - uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-22.05

      - uses: cachix/cachix-action@v14
        with:
          name: moergo-glove80-zmk-dev
          skipPush: true

      - name: Build all three firmware images
        run: nix-build config -o result

      - name: Collect firmware
        run: |
          mkdir -p firmware
          cp result/*.uf2 firmware/
          ls -l firmware

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: go60-dongle-firmware
          path: firmware/*.uf2
