# Left half as a BLE split peripheral of the dongle (was the central).
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
CONFIG_ZMK_SPLIT_BLE=y

# Forward the left trackpad over the split.
CONFIG_ZMK_POINTING=y

# A peripheral does not present USB HID.
CONFIG_ZMK_USB=n

# The left half's RGB "underglow indicators" (layer/battery/BLE status) only link
# when the board is the split central. As a peripheral those symbols don't exist
# (rgb_underglow.c fails to link), so disable underglow here. Status indication is
# now the dongle's job. To restore plain RGB *lighting* (no status) later, re-enable
# this and instead delete the indicators node in the overlay:
#     / { chosen { /delete-property/ zmk,underglow-indicators; }; };
#     /delete-node/ &underglow_indicators;
CONFIG_ZMK_RGB_UNDERGLOW=n
